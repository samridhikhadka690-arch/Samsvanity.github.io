<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sam's Vanity</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
    <!-- Links the Java/JavaScript form verification engine script -->
    <script src="../js/feedback.js" defer></script>
</head>
<body>

    <header>
        <div class="header-1">
            <a class="logo">Sam's Vanity</a>
        </div>
        <div class="header-2">
            <nav class="navbar">
                <a href="../index.html">Home</a>
                <a href="product.html">Product</a>
                <a href="contact.html" class="active">Contact</a>
                <a href="aboutus.html">About Us</a>
            </nav>
        </div>
    </header>

    <section>
        <h1 class="heading-title">Drop Us A <span>Message</span></h1>
        
        <div class="contact-form-box">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter name...">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter email...">
                </div>
                <div class="form-group">
                    <label for="message">Feedback / Inquiry</label>
                    <textarea id="message" rows="5" required placeholder="Write your feedback here..."></textarea>
                </div>
                <button type="submit" class="btn" style="width:100%; border:none; cursor:pointer;">Submit Details</button>
            </form>
        </div>
    </section>

</body>
</html>
